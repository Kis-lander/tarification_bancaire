services:
  - type: web
    name: tarification-bancaire
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci && npm run build && cd build && npm ci --omit=dev
    startCommand: cd build && node ace migration:run --force && node ace db:seed && node bin/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 24.14.1
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: SESSION_DRIVER
        value: cookie
      - key: MAIL_MAILER
        value: resend
      - key: MAIL_FROM_NAME
        value: Banque Centrale du Congo
      - key: BCC_SEED_EMAIL
        sync: false
      - key: BCC_SEED_PASSWORD
        sync: false
      - key: DB_HOST
        fromDatabase:
          name: tarification-bancaire-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: tarification-bancaire-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: tarification-bancaire-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: tarification-bancaire-db
          property: password
      - key: DB_DATABASE
        fromDatabase:
          name: tarification-bancaire-db
          property: database

databases:
  - name: tarification-bancaire-db
    plan: free
    region: frankfurt
    databaseName: tarification_bancaire
